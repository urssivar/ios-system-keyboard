name: Build iOS Keyboard Explorer

on:
  push:
    branches: [main]
    paths:
      - 'layout/**'
      - 'scripts/build.py'
      - 'scripts/template.html'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Check layouts (dry run)
        run: python scripts/build.py --check

      - name: Build HTML
        run: python scripts/build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-keyboards-${{ github.sha }}
          path: dist/ios-keyboards.html
          retention-days: 90

      # ── Optional: commit dist/ back to repo ──────────────────────────────
      # Uncomment if you want the built file committed automatically:
      #
      # - name: Commit dist
      #   run: |
      #     git config user.name  "github-actions[bot]"
      #     git config user.email "github-actions[bot]@users.noreply.github.com"
      #     git add dist/ios-keyboards.html
      #     git diff --cached --quiet || git commit -m "build: update ios-keyboards.html [skip ci]"
      #     git push

      # ── Optional: publish as GitHub Release on tag ───────────────────────
      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ios-keyboards.html
          body: |
            Автоматически собранный файл iOS Keyboard Explorer.

            Скачай `ios-keyboards.html` и открой в любом браузере.
