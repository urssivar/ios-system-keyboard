name: Build & Deploy Keyboards

on:
  push:
    branches: [main]
    paths:
      - 'layout/**'
      - 'scripts/**'

  workflow_dispatch:

# Sets permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      # ── iOS keyboard explorer (HTML) ──
      - name: Check iOS layouts
        run: python scripts/build.py --check

      - name: Build iOS keyboard explorer
        run: python scripts/build.py

      # ── macOS .keylayout files ──
      - name: Check macOS layouts
        run: python scripts/build_keylayout.py --check

      - name: Build macOS keylayouts
        run: python scripts/build_keylayout.py

      # ── Copy installer ──
      - name: Copy installer script
        run: cp scripts/install_keylayout.sh dist/keylayout/install.sh && chmod +x dist/keylayout/install.sh

      # ── Prepare for Pages ──
      - name: Prepare Pages content
        run: |
          cp dist/ios-keyboards.html dist/index.html

      # ── Upload artifacts ──
      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: keyboards-${{ github.sha }}
          path: |
            dist/ios-keyboards.html
            dist/keylayout/
          retention-days: 90

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/

  # ── Deploy to GitHub Pages ──
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # ── Release on tag ──
  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v5
        with:
          name: keyboards-${{ github.sha }}

      - name: Create zip
        run: zip -r macos-keylayouts.zip keylayout/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ios-keyboards.html
            macos-keylayouts.zip
          body: |
            ## Клавиатуры / Keyboards

            **Веб-превью iOS клавиатур:** скачайте `ios-keyboards.html` или перейдите на [GitHub Pages](${{ github.server_url }}/${{ github.repository }})

            **macOS раскладки:** скачайте `macos-keylayouts.zip`, распакуйте и запустите:
            ```bash
            cd keylayout && chmod +x install.sh && ./install.sh
            ```
