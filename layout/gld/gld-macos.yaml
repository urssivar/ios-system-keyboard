displayNames:
  en: Nanai
  ru: Нанайский
  gld: На̄най

decimal: ','

macOS:
  primary:
    layers:
      default: |
        ] 1 2 3 4 5 6 7 8 9 0 - =
          й ӡ у к е н г ш ᵸ з х ъ ё
          ӈ ы в а п р о л д ʼ э
          я ч с м и т ь б ю /
      shift: &SHIFT |
        [ ! " № % : , . ; ( ) _ +
          Й Ӡ У К Е Н Г Ш ᵸ З Х Ъ Ё
          Ӈ Ы В А П Р О Л Д ʼ Э
          Я Ч С М И Т Ь Б Ю ?
      caps: |
        ] 1 2 3 4 5 6 7 8 9 0 - =
          Й Ӡ У К Е Н Г Ш ᵸ З Х Ъ Ё
          Ӈ Ы В А П Р О Л Д ʼ Э
          Я Ч С М И Т Ь Б Ю /
      caps+shift: *SHIFT
      alt: &ALT |
        ] ! @ # $ % ^ & * { } – »
          ͜ ӡ ӯ ӄ е̄ ᵸ ҕ ̄ н ӈ ӽ б ё̄
          з ы̄ ў а̄ ф р о̄ л д : э̄
          ≈ ц ± µ ӣ і ™ ≤ ≥ /
      alt+shift: |
        [ | " £ € ∞ ¬ ¶ √ ' ` — «
          ͜ Ӡ Ӯ Ӄ Е̄ ᵸ Ҕ ̄ Н Ӈ Ӽ Б Ё̄
          З Ы̄ Ў А̄ Ф Р О̄ Л Д ; Э̄
          ≈ Ц ± µ Ӣ І ™ < > ?
      alt+caps: *ALT
      cmd: &CMD |
        ` 1 2 3 4 5 6 7 8 9 0 - =
          q w e r t y u i o p [ ] \
          a s d f g h j k l ; '
          z x c v b n m , . /
      cmd+shift: &CMD_SHIFT |
        ~ ! @ # $ % ^ & * ( ) _ +
          Q W E R T Y U I O P { } |
          A S D F G H J K L : "
          Z X C V B N M < > ?
      cmd+alt: *CMD
      cmd+alt+shift: *CMD_SHIFT
  deadKeys:
    alt:
      - "̄"
    alt+shift:
      - "̄"
    alt+caps:
      - "̄"
